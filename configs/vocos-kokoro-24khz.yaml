# Generated for Kokoro iSTFTNet distillation into Vocos
seed_everything: 4444

data:
  class_path: vocos.dataset.VocosDataModule
  init_args:
    train_params:
      filelist_path: /export/eingerman/audio/vocoder/filelists/vocos.train.txt
      sampling_rate: 24000
      num_samples: 19200
      batch_size: 8
      num_workers: 8

    val_params:
      filelist_path: /export/eingerman/audio/vocoder/filelists/vocos.val.txt
      sampling_rate: 24000
      num_samples: 38400
      batch_size: 8
      num_workers: 8

model:
  class_path: vocos.experiment.VocosExp
  init_args:
    sample_rate: 24000
    initial_learning_rate: 5e-4
    mel_loss_coeff: 45
    mrd_loss_coeff: 0.1
    num_warmup_steps: 0
    pretrain_mel_steps: 0

    evaluate_utmos: false
    evaluate_pesq: false
    evaluate_periodicty: false

    feature_extractor:
      class_path: vocos.feature_extractors.MelSpectrogramFeatures
      init_args:
        sample_rate: 24000
        n_fft: 1200
        hop_length: 300
        n_mels: 80
        padding: center

    backbone:
      class_path: vocos.models.VocosBackbone
      init_args:
        input_channels: 80
        dim: 512
        intermediate_dim: 1536
        num_layers: 8

    head:
      class_path: vocos.heads.ISTFTHead
      init_args:
        dim: 512
        n_fft: 1200
        hop_length: 300
        padding: center

trainer:
  logger:
    class_path: pytorch_lightning.loggers.TensorBoardLogger
    init_args:
      save_dir: logs/
      name: vocos-kokoro

  callbacks:
    - class_path: pytorch_lightning.callbacks.LearningRateMonitor
    - class_path: pytorch_lightning.callbacks.ModelSummary
      init_args:
        max_depth: 2
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
      init_args:
        monitor: val_loss
        filename: vocos_kokoro_{epoch}_{step}_{val_loss:.4f}
        save_top_k: 3
        save_last: true

  max_steps: 1000000
  limit_val_batches: 32
  accelerator: gpu
  devices: [0]
  log_every_n_steps: 100
