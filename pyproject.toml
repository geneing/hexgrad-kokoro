[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kokoro"
version = "0.9.4"
description = "TTS"
readme = "README.md"
authors = [
    { name="hexgrad", email="hello@hexgrad.com" }
]
license = { file = "LICENSE" }
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent"
]
requires-python = ">=3.10, <3.14"
dependencies = [
    "ai-edge-quantizer-nightly>=0.5.0.dev20260219",
    "huggingface_hub",
    "ipykernel>=6.30.1",
    "ipywidgets>=8.1.7",
    "litert-torch-nightly>=0.9.0.dev20260218",
    "loguru",
    "matplotlib>=3.10.8",
    "misaki[en,ja,zh]>=0.9.4",
    "numpy",
    "pillow",
    "tensorflow>=2.18.1",
    "torch",
    "torchvision>=0.24.1",
    "transformers",
    "vocos",
]

[project.optional-dependencies]
executorch-quant = [
    "executorch",
]

[project.scripts]
kokoro = "kokoro.__main__:main"
kokoro-vocoder-data = "kokoro.vocoder_data:main"
kokoro-vocos-train = "kokoro.train_vocos:main"
kokoro-vocos-train-tf = "kokoro.train_vocos_tf:main"
kokoro-vocos-convert-pt-to-tf = "kokoro.convert_vocos_checkpoint_tf:main"
kokoro-vocos-test-pt-ckpt-tf = "kokoro.test_tf_vocos_from_pytorch_ckpt:main"
kokoro-vocos-validate-tf-quant = "kokoro.validate_tf_quantizations:main"
kokoro-vocos-litert-pipeline = "kokoro.tf_litert_pipeline:main"

[tool.hatch.build.targets.wheel]
only-include = ["kokoro"]
only-packages = true

[tool.uv.sources]
vocos = { path = "third_party/vocos", editable = true }

[project.urls]
Homepage = "https://github.com/hexgrad/kokoro"
Repository = "https://github.com/hexgrad/kokoro"
